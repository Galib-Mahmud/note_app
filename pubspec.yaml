name: glassy_notes_app
description: A Flutter app with macOS style glassmorphism
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # State Management
  get: ^4.6.6

  # Navigation
  go_router: ^17.2.1

  # UI Components
  google_fonts: ^6.1.0
  flutter_staggered_animations: ^1.1.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/